<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌遊入口 | Boardgame Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <!-- Background Steam particles canvas -->
    <canvas id="steam-canvas"></canvas>

    <div class="portal-container">
        <!-- Dashboard Header -->
        <header class="portal-header">
            <div class="header-gears">
                <div class="gear gear-large">⚙️</div>
                <div class="gear gear-medium">⚙️</div>
                <div class="gear gear-small">⚙️</div>
            </div>
            <h1 class="portal-title">桌遊入口</h1>
            <p class="portal-subtitle">請選擇桌遊進入遊戲</p>
            <div class="header-divider">
                <div class="divider-line"></div>
                <div class="divider-gem"></div>
                <div class="divider-line"></div>
            </div>
        </header>

        <!-- Game Cards Selection Grid -->
        <main class="games-grid">
            <!-- Active Game: Time Bomb -->
            <div class="game-card active-game" onclick="selectGame('/timebomb/')">
                <div class="card-border"></div>
                <div class="card-status status-active">🟢 運作中</div>
                <div class="card-badge">HOT</div>
                
                <div class="card-content">
                    <div class="card-icon">💥</div>
                    <h2 class="card-title">驚爆倫敦</h2>
                    <h3 class="card-subtitle">Time Bomb: London Defusal</h3>
                    <p class="card-desc">大偵探與莫里亞蒂的世紀對決！拆除引線，或是暗中引爆炸彈，展開一場驚心動魄的心理戰。</p>
                    
                    <div class="card-footer">
                        <span class="player-count-badge">👥 4 - 8 人</span>
                        <button class="btn btn-gold btn-card-action">
                            <span>進入遊戲</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Active Game: Skull -->
            <div class="game-card active-game" onclick="selectGame('/skull/')">
                <div class="card-border"></div>
                <div class="card-status status-active">🟢 運作中</div>
                <div class="card-badge" style="border-color: var(--color-brass); background: linear-gradient(135deg, var(--color-brass) 0%, var(--color-bronze) 100%);">NEW</div>
                
                <div class="card-content">
                    <div class="card-icon">💀</div>
                    <h2 class="card-title">骷髏牌</h2>
                    <h3 class="card-subtitle">Skull: Flowers & Skulls</h3>
                    <p class="card-desc">吹牛與心理戰的極致對決！放置鮮花或骷髏，發起競標並看穿對手的謊言，考驗你的風險控制與讀心術。</p>
                    
                    <div class="card-footer">
                        <span class="player-count-badge">👥 2 - 8 人</span>
                        <button class="btn btn-gold btn-card-action">
                            <span>進入遊戲</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="portal-footer-info">
            <p>桌遊入口 © 2026. All Systems Operational.</p>
        </footer>
    </div>

    <script src="portal.js"></script>
</body>
</html>
